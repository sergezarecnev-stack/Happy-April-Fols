<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapphire SDK Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: #eee; font-family: 'Inter', sans-serif; }
        .gradient-top { background: linear-gradient(90deg, #1e40af, #3b82f6); }
        .item-card { background: #111116; border: 1px solid #222; transition: 0.2s; }
        .item-card:hover { border-color: #3b82f6; background: #161620; }
    </style>
</head>
<body class="flex flex-col items-center p-6 h-screen">
    <div class="w-full max-w-md bg-[#0d0d12] rounded-3xl border border-white/5 shadow-2xl flex flex-col overflow-hidden h-[600px]">
        <div class="gradient-top p-5 flex justify-between items-center">
            <span class="font-black italic text-xl">SAPPHIRE SDK PRO</span>
            <div class="flex gap-2"><div class="w-3 h-3 rounded-full bg-red-500/50"></div><div class="w-3 h-3 rounded-full bg-green-500/50"></div></div>
        </div>

        <div class="p-4 bg-black/40 space-y-3">
            <div class="flex gap-2">
                <input id="fName" type="text" placeholder="Название..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm w-1/2 focus:outline-none focus:border-blue-500">
                <select id="fExt" class="bg-white/5 border border-white/10 rounded-xl px-2 py-2 text-sm text-blue-400 font-bold focus:outline-none">
                    <option value=".geode">.geode</option>
                    <option value=".dll">.dll</option>
                    <option value=".sapphire">.sapphire</option>
                </select>
                <button onclick="add()" class="bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-500 transition-all">ADD</button>
            </div>
        </div>

        <div id="list" class="flex-1 overflow-y-auto p-4 space-y-2">
            <div class="item-card p-4 rounded-2xl flex justify-between items-center">
                <div><p class="text-sm font-bold">Speedhack_v2</p><p class="text-[10px] text-blue-500 font-mono uppercase">system.dll</p></div>
                <div class="w-10 h-5 bg-blue-600 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
            </div>
        </div>
        
        <div class="p-3 text-center border-t border-white/5 text-[10px] text-gray-600 tracking-widest uppercase">Injection Status: Active</div>
    </div>

    <script>
        function add() {
            const name = document.getElementById('fName').value.trim();
            const ext = document.getElementById('fExt').value;
            if(!name) return;
            const card = document.createElement('div');
            card.className = 'item-card p-4 rounded-2xl flex justify-between items-center animate-pulse';
            card.innerHTML = '<div><p class="text-sm font-bold">'+name+'</p><p class="text-[10px] text-blue-500 font-mono uppercase">custom'+ext+'</p></div><input type="checkbox" checked class="w-5 h-5 accent-blue-500">';
            document.getElementById('list').prepend(card);
            document.getElementById('fName').value = '';
            setTimeout(() => card.classList.remove('animate-pulse'), 500);
        }
    </script>
</body>
</html>
